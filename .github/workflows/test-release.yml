name: Run tests (release)

on:
  workflow_dispatch:
  push:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"

jobs:
  test:
    uses: urob/zmk-actions/.github/workflows/run-tests.yml@v12.0.0
    with:
      toolchain: gnuarmemb
      zmk-version: v0.3 # ZMK line this module targets; bumped by track-zmk's PR

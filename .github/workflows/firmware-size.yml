name: Firmware size

# Builds the dynamic-macro module across its config combinations (plus a baseline
# with the module entirely absent) for a real nice!nano v2 target, sizes each ELF,
# and reports a markdown table of flash/RAM with deltas vs. the baseline. Use the
# numbers to populate the "Firmware Size" section of README.md.
#
# Manual only: footprint changes rarely, so this is run on demand rather than per
# push. Trigger from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:
  # TEMPORARY: run on push to the fix branch to iterate the build setup without
  # round-tripping through main (workflow_dispatch only fires from the default
  # branch). REMOVE this push: block once the matrix is green.
  push:
    branches:
      - fix/size-workflow-west-topology

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: zmkfirmware/zmk-build-arm:stable
    # The zmk-build-arm container's default shell is dash (sh), which rejects
    # `set -o pipefail`. Force bash for every run step in this job.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Names spell out every compile-time switch explicitly (feedback / NVS
          # persistence / events / auto-erase) rather than relying on "default" as
          # shorthand, so the table is self-describing.
          - id: 0-baseline
            name: "Module absent (baseline)"
            conf: tests/size/baseline.conf
            baseline: true
          - id: 1-minimal
            name: "feedback OFF · NVS off · events off"
            conf: tests/size/minimal.conf
          - id: 2-persist-nofeedback
            name: "feedback OFF · NVS on · events off"
            conf: tests/size/persist_nofeedback.conf
          - id: 3-feedback-nopersist
            name: "feedback VERBOSE · NVS off · events off"
            conf: tests/size/feedback_nopersist.conf
          - id: 4-default
            name: "feedback VERBOSE · NVS on · events off (shipping defaults)"
            conf: tests/size/default.conf
          - id: 5-auto-erase
            name: "feedback VERBOSE · NVS on · events off · auto-erase"
            conf: tests/size/auto_erase.conf
          - id: 6-full
            name: "feedback VERBOSE · NVS on · events ON · auto-erase"
            conf: tests/size/full.conf
    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        # default path: the repo at $GITHUB_WORKSPACE (no nesting). The west
        # workspace lives in an isolated temp dir; the module is referenced into
        # the build via ZMK_EXTRA_MODULES, NOT as a west `self` project — this is
        # the urob/zmk-actions pattern for "a repo that is itself a Zephyr module".

      - name: Set up isolated west workspace
        run: |
          set -euo pipefail
          ws="$RUNNER_TEMP/ws"
          mkdir -p "$ws/config"
          # the manifest dir west init -l points at; ZMK-only manifest (no module)
          cp "$GITHUB_WORKSPACE/tests/size/west.yml" "$ws/config/west.yml"
          echo "WS=$ws" >> "$GITHUB_ENV"

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/ws/modules/
            ${{ runner.temp }}/ws/tools/
            ${{ runner.temp }}/ws/zephyr/
            ${{ runner.temp }}/ws/bootloader/
            ${{ runner.temp }}/ws/zmk/
          key: size-west-${{ hashFiles('tests/size/west.yml') }}
          restore-keys: size-west-

      - name: West init + update
        working-directory: ${{ runner.temp }}/ws
        run: |
          set -euo pipefail
          west init -l config
          west update --fetch-opt=--filter=tree:0
          west zephyr-export

      - name: Build ${{ matrix.name }}
        working-directory: ${{ runner.temp }}/ws
        run: |
          set -euo pipefail
          # The baseline passes DM_SIZE_BASELINE to the devicetree preprocessor so
          # the keymap omits the behavior node entirely; with no zmk,behavior-
          # dynamic-macro compatible present, the module's Kconfig auto-enable
          # (dt_compat_enabled) stays off and none of the module compiles.
          BASELINE_ARGS=""
          if [ "${{ matrix.baseline }}" = "true" ]; then
            # DTS_EXTRA_CPPFLAGS makes DM_SIZE_BASELINE visible to the keymap's
            # C-preprocessor pass (the overlay CPP — EXTRA_DTC_FLAGS goes to dtc, NOT
            # this pass), so the behavior node + &dm bindings are omitted. With no
            # zmk,behavior-dynamic-macro node present, the module's Kconfig auto-enable
            # (default $(dt_compat_enabled,...)) stays off and CMakeLists compiles none
            # of it. (The symbol has no prompt, so it cannot be forced off via
            # -DCONFIG_...=n — the keymap node absence is the only lever, and it is
            # sufficient.)
            BASELINE_ARGS='-DDTS_EXTRA_CPPFLAGS=-DDM_SIZE_BASELINE'
          fi
          # ZMK_EXTRA_MODULES points the build at the checked-out module;
          # BOARD_ROOT exposes the in-repo size shield under tests/size/boards/.
          # hwmv2 board naming (matches ../zmk-config): nice!nano v2 is
          # nice_nano@2.0.0//zmk, NOT the legacy nice_nano_v2.
          # Tee the build output so the size step can read Zephyr's memory-region
          # report (FLASH/RAM "Region Size" = the board's usable capacity).
          west build -s zmk/app -d build -b "nice_nano@2.0.0//zmk" -p always -- \
            -DSHIELD=dm_size \
            -DZMK_EXTRA_MODULES="$GITHUB_WORKSPACE" \
            -DBOARD_ROOT="$GITHUB_WORKSPACE/tests/size" \
            -DEXTRA_CONF_FILE="$GITHUB_WORKSPACE/${{ matrix.conf }}" \
            $BASELINE_ARGS 2>&1 | tee build.out

      - name: Size the ELF
        working-directory: ${{ runner.temp }}/ws
        run: |
          set -euo pipefail
          # ZMK renames the final image zmk.elf (not Zephyr's default zephyr.elf).
          elf=build/zephyr/zmk.elf
          [ -f "$elf" ] || elf=build/zephyr/zephyr.elf  # fallback, just in case
          # The Zephyr SDK ARM toolchain is arm-zephyr-eabi-*, not arm-none-eabi-*,
          # and may not be on PATH. Resolve a size binary robustly.
          SIZE=""
          for cand in arm-zephyr-eabi-size arm-none-eabi-size size; do
            if command -v "$cand" >/dev/null 2>&1; then SIZE="$cand"; break; fi
          done
          if [ -z "$SIZE" ]; then
            SIZE="$(find "${ZEPHYR_SDK_INSTALL_DIR:-/opt}" -name '*-size' -type f 2>/dev/null | head -1)"
          fi
          echo "Using size tool: $SIZE"
          "$SIZE" -A "$elf"
          # flash = text + data ; ram = data + bss, from the -B (Berkeley) totals.
          read -r text data bss _ < <("$SIZE" -B "$elf" | awk 'NR==2{print $1, $2, $3}')
          flash=$((text + data))
          ram=$((data + bss))
          # Board capacity from Zephyr's own memory-region report, whose lines read:
          #   FLASH:      202868 B       792 KB     25.01%
          #     RAM:       60812 B       256 KB     23.20%
          # i.e. label-with-colon, then "<num> <unit>" for Region Size in fields 4-5
          # ($1=FLASH:, $2=usedNum, $3=B, $4=capNum, $5=KB). Convert cap to bytes.
          # Non-fatal: a grep miss must not abort the step (set -e + pipefail).
          region_bytes() {
            awk -v lbl="$1" '
              $1==lbl":" {
                n=$4; u=$5;
                if (u ~ /MB/) n*=1024*1024; else if (u ~ /KB|kB/) n*=1024;
                printf "%d", n; exit
              }' build.out
          }
          flash_cap="$(region_bytes FLASH || true)"; flash_cap="${flash_cap:-0}"
          ram_cap="$(region_bytes RAM || true)";     ram_cap="${ram_cap:-0}"
          mkdir -p "$GITHUB_WORKSPACE/out"
          printf '%s\t%s\t%s\t%s\t%s\t%s\n' \
            "${{ matrix.id }}" "${{ matrix.name }}" "$flash" "$ram" "$flash_cap" "$ram_cap" \
            > "$GITHUB_WORKSPACE/out/${{ matrix.id }}.tsv"
          echo "id=${{ matrix.id }} flash=$flash/$flash_cap ram=$ram/$ram_cap"

      - name: Upload size fragment
        uses: actions/upload-artifact@v4
        with:
          name: size-${{ matrix.id }}
          path: out/${{ matrix.id }}.tsv

  report:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Collect size fragments
        uses: actions/download-artifact@v4
        with:
          pattern: size-*
          path: frags
          merge-multiple: true

      - name: Build the size table
        run: |
          set -euo pipefail
          # gather rows: id <tab> name <tab> flash <tab> ram <tab> flash_cap <tab> ram_cap
          cat frags/*.tsv | sort > all.tsv
          base_flash=$(awk -F'\t' '$1=="0-baseline"{print $3}' all.tsv)
          base_ram=$(awk -F'\t' '$1=="0-baseline"{print $4}' all.tsv)
          flash_cap=$(awk -F'\t' '$1=="0-baseline"{print $5}' all.tsv)
          ram_cap=$(awk -F'\t' '$1=="0-baseline"{print $6}' all.tsv)

          # KiB to one decimal, and percent of capacity to one decimal.
          kib()  { awk -v b="$1" 'BEGIN{printf "%.1f", b/1024}'; }
          pct()  { awk -v u="$1" -v c="$2" 'BEGIN{ if(c>0) printf "%.1f", 100*u/c; else printf "?"}'; }

          {
            echo "## Firmware size — nice!nano v2"
            echo ""
            echo "Total firmware (flash = text+data, RAM = data+bss) and the module's"
            echo "contribution (Δ vs. the module-absent baseline). Percentages are of the"
            echo "board's usable capacity: **flash $(kib "$flash_cap") KiB**, **RAM $(kib "$ram_cap") KiB**."
            echo ""
            echo "| Configuration | Flash | Flash % | Δ Flash | RAM | RAM % | Δ RAM |"
            echo "| --- | --: | --: | --: | --: | --: | --: |"
            # %+d renders the sign for both positive and negative deltas.
            while IFS=$'\t' read -r id name flash ram fcap rcap; do
              fk="$(kib "$flash") KiB"; rk="$(kib "$ram") KiB"
              fp="$(pct "$flash" "$flash_cap")%"; rp="$(pct "$ram" "$ram_cap")%"
              if [ "$id" = "0-baseline" ]; then
                printf '| %s | %s | %s | — | %s | %s | — |\n' "$name" "$fk" "$fp" "$rk" "$rp"
              else
                df=$((flash - base_flash)); dr=$((ram - base_ram))
                printf '| %s | %s | %s | %+d B | %s | %s | %+d B |\n' \
                  "$name" "$fk" "$fp" "$df" "$rk" "$rp" "$dr"
              fi
            done < all.tsv
            echo ""
            echo "_Raw bytes: baseline flash ${base_flash} B, RAM ${base_ram} B._"
          } | tee size_table.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload size table
        uses: actions/upload-artifact@v4
        with:
          name: firmware-size-table
          path: size_table.md

name: Firmware size

# Builds the dynamic-macro module across its config combinations (plus a baseline
# with the module entirely absent) for a real nice!nano v2 target, sizes each ELF,
# and reports a markdown table of flash/RAM with deltas vs. the baseline. Use the
# numbers to populate the "Firmware Size" section of README.md.
#
# Manual only: footprint changes rarely, so this is run on demand rather than per
# push. Trigger from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:
  # TEMPORARY: run on push to the fix branch to iterate the build setup without
  # round-tripping through main (workflow_dispatch only fires from the default
  # branch). REMOVE this push: block once the matrix is green.
  push:
    branches:
      - fix/size-workflow-west-topology

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: zmkfirmware/zmk-build-arm:stable
    # The zmk-build-arm container's default shell is dash (sh), which rejects
    # `set -o pipefail`. Force bash for every run step in this job.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 0-baseline
            name: "Baseline (module absent)"
            conf: tests/size/baseline.conf
            baseline: true
          - id: 1-minimal
            name: "Minimal (RAM only, no feedback)"
            conf: tests/size/minimal.conf
          - id: 2-persist-nofeedback
            name: "Persistent, no feedback"
            conf: tests/size/persist_nofeedback.conf
          - id: 3-feedback-nopersist
            name: "Feedback, no persistence"
            conf: tests/size/feedback_nopersist.conf
          - id: 4-default
            name: "Default (feedback + persistence)"
            conf: tests/size/default.conf
          - id: 5-full
            name: "Full (feedback + events + persistence + auto-erase)"
            conf: tests/size/full.conf
    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        # default path: the repo at $GITHUB_WORKSPACE (no nesting). The west
        # workspace lives in an isolated temp dir; the module is referenced into
        # the build via ZMK_EXTRA_MODULES, NOT as a west `self` project — this is
        # the urob/zmk-actions pattern for "a repo that is itself a Zephyr module".

      - name: Set up isolated west workspace
        run: |
          set -euo pipefail
          ws="$RUNNER_TEMP/ws"
          mkdir -p "$ws/config"
          # the manifest dir west init -l points at; ZMK-only manifest (no module)
          cp "$GITHUB_WORKSPACE/tests/size/west.yml" "$ws/config/west.yml"
          echo "WS=$ws" >> "$GITHUB_ENV"

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/ws/modules/
            ${{ runner.temp }}/ws/tools/
            ${{ runner.temp }}/ws/zephyr/
            ${{ runner.temp }}/ws/bootloader/
            ${{ runner.temp }}/ws/zmk/
          key: size-west-${{ hashFiles('tests/size/west.yml') }}
          restore-keys: size-west-

      - name: West init + update
        working-directory: ${{ runner.temp }}/ws
        run: |
          set -euo pipefail
          west init -l config
          west update --fetch-opt=--filter=tree:0
          west zephyr-export

      - name: Build ${{ matrix.name }}
        working-directory: ${{ runner.temp }}/ws
        run: |
          set -euo pipefail
          # The baseline passes DM_SIZE_BASELINE to the devicetree preprocessor so
          # the keymap omits the behavior node entirely; with no zmk,behavior-
          # dynamic-macro compatible present, the module's Kconfig auto-enable
          # (dt_compat_enabled) stays off and none of the module compiles.
          DTC_FLAGS=""
          if [ "${{ matrix.baseline }}" = "true" ]; then
            DTC_FLAGS="-DEXTRA_DTC_FLAGS=-DDM_SIZE_BASELINE"
          fi
          # ZMK_EXTRA_MODULES points the build at the checked-out module;
          # BOARD_ROOT exposes the in-repo size shield under tests/size/boards/.
          # hwmv2 board naming (matches ../zmk-config): nice!nano v2 is
          # nice_nano@2.0.0//zmk, NOT the legacy nice_nano_v2.
          west build -s zmk/app -d build -b "nice_nano@2.0.0//zmk" -p always -- \
            -DSHIELD=dm_size \
            -DZMK_EXTRA_MODULES="$GITHUB_WORKSPACE" \
            -DBOARD_ROOT="$GITHUB_WORKSPACE/tests/size" \
            -DEXTRA_CONF_FILE="$GITHUB_WORKSPACE/${{ matrix.conf }}" \
            $DTC_FLAGS

      - name: Size the ELF
        working-directory: ${{ runner.temp }}/ws
        run: |
          set -euo pipefail
          elf=build/zephyr/zephyr.elf
          # The Zephyr SDK ARM toolchain is arm-zephyr-eabi-*, not arm-none-eabi-*,
          # and may not be on PATH. Resolve a size binary robustly.
          SIZE=""
          for cand in arm-zephyr-eabi-size arm-none-eabi-size size; do
            if command -v "$cand" >/dev/null 2>&1; then SIZE="$cand"; break; fi
          done
          if [ -z "$SIZE" ]; then
            SIZE="$(find "${ZEPHYR_SDK_INSTALL_DIR:-/opt}" -name '*-size' -type f 2>/dev/null | head -1)"
          fi
          echo "Using size tool: $SIZE"
          "$SIZE" -A "$elf"
          # flash = text + data ; ram = data + bss, from the -B (Berkeley) totals.
          read -r text data bss _ < <("$SIZE" -B "$elf" | awk 'NR==2{print $1, $2, $3}')
          flash=$((text + data))
          ram=$((data + bss))
          mkdir -p "$GITHUB_WORKSPACE/out"
          printf '%s\t%s\t%s\t%s\n' "${{ matrix.id }}" "${{ matrix.name }}" "$flash" "$ram" \
            > "$GITHUB_WORKSPACE/out/${{ matrix.id }}.tsv"
          echo "id=${{ matrix.id }} flash=$flash ram=$ram"

      - name: Upload size fragment
        uses: actions/upload-artifact@v4
        with:
          name: size-${{ matrix.id }}
          path: out/${{ matrix.id }}.tsv

  report:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Collect size fragments
        uses: actions/download-artifact@v4
        with:
          pattern: size-*
          path: frags
          merge-multiple: true

      - name: Build the size table
        run: |
          set -euo pipefail
          # gather rows: id <tab> name <tab> flash <tab> ram
          cat frags/*.tsv | sort > all.tsv
          base_flash=$(awk -F'\t' '$1=="0-baseline"{print $3}' all.tsv)
          base_ram=$(awk -F'\t' '$1=="0-baseline"{print $4}' all.tsv)

          {
            echo "## Firmware size — nice!nano v2 (\`arm-none-eabi-size\`)"
            echo ""
            echo "Baseline (module absent): **flash ${base_flash} B**, **RAM ${base_ram} B**. Deltas below are the module's contribution."
            echo ""
            echo "| Configuration | Flash (B) | Δ Flash | RAM (B) | Δ RAM |"
            echo "| --- | --: | --: | --: | --: |"
            while IFS=$'\t' read -r id name flash ram; do
              if [ "$id" = "0-baseline" ]; then
                printf '| %s | %s | — | %s | — |\n' "$name" "$flash" "$ram"
              else
                df=$((flash - base_flash)); dr=$((ram - base_ram))
                printf '| %s | %s | +%s | %s | +%s |\n' "$name" "$flash" "$df" "$ram" "$dr"
              fi
            done < all.tsv
          } | tee size_table.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload size table
        uses: actions/upload-artifact@v4
        with:
          name: firmware-size-table
          path: size_table.md

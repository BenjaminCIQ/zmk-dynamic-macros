CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y
CONFIG_ZMK_BLE=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_DEBUG=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_PERSIST=n
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_OFF=y
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_ASSIGN_TIMEOUT=500
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_RAM_SLOTS=3
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_MAX_EVENTS=8
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_AVG_EVENTS_PER_SLOT=2
# The shared event pool (and its "pool full" rejection) exists ONLY in the
# modular stack, so this case is new-stack-only: AVG_EVENTS_PER_SLOT has no
# meaning for the legacy per-slot arrays, which would store all three macros.
# Excluded from the parity twin generator (tests/parity/e2e/generate.sh) since
# it is already a new-stack case — there is no legacy oracle to match.
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_NEW_STACK=y

CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y
CONFIG_ZMK_BLE=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_DEBUG=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_PERSIST=n
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_OFF=y
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_ASSIGN_TIMEOUT=500
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_RAM_SLOTS=4
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_MAX_EVENTS=8
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_AVG_EVENTS_PER_SLOT=2
# Pool = AVG_EVENTS_PER_SLOT(2) x RAM_SLOTS(4) = 8 events, == MAX_EVENTS, so the
# MAX_EVENTS <= ARENA_EVENTS build guard holds (a single macro can still fill the
# whole pool). Three short macros (2+4+2) exhaust it; the fourth assign is
# rejected.
#
# Exercises the shared event pool's "pool full" rejection: AVG_EVENTS_PER_SLOT x
# RAM_SLOTS caps the total events across all slots, so the fourth assign is
# rejected once the pool is exhausted.

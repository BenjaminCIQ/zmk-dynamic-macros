# Auto-erase isolation: identical to default (verbose feedback + persistence) plus
# ONLY the auto-erase scheduler, so (auto_erase - default) is auto-erase's cost and
# (full - auto_erase) is the events system's cost.
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_VERBOSE=y
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_PERSIST=y
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_AUTO_ERASE=y

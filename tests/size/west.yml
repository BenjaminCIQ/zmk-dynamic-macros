# West manifest for the firmware-size workflow. Pulls ZMK (with its Zephyr) and
# wires THIS repo as the dynamic-macro module, so the size builds use the module
# at the checked-out commit. Mirrors tests/west.yml but adds the module self-ref.
manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
  self:
    path: zmk-dynamic-macros

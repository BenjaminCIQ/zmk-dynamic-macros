# West manifest for the firmware-size workspace. ZMK (with its Zephyr) only —
# this module is NOT a `self` project here; the workflow points the build at the
# checked-out module via ZMK_EXTRA_MODULES. Keeping the manifest module-free lets
# the workspace live in an isolated temp dir (the proven urob/zmk-actions pattern)
# without the module nesting under it.
manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
  self:
    path: config

# Enable settings subsystem for NVS persistence
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Configure dynamic macro slots for tests
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_NVS_SLOTS=4
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_RAM_SLOTS=4

# Disable feedback typing in tests (cleaner output verification)
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_OFF=y

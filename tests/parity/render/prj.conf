# Render parity capture: needs the EVENTS query API (dm_get_preview_string) and
# typing enabled (the real preview walk), at the US locale (the default golden).
# Locale is compile-time; capture other locales by overriding DM_LOCALE in a
# separate build.
#
# NOTE: ZMK_BEHAVIOR_DYNAMIC_MACRO is promptless (default $(dt_compat_enabled,...)),
# so it is NOT set here — it auto-enables from the &dm node in app.overlay. The
# settable sub-options below live inside `if ZMK_BEHAVIOR_DYNAMIC_MACRO`.
CONFIG_ZTEST=y
CONFIG_ZTEST_NEW_API=y

CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_EVENTS=y
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_PERSIST=n
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_VERBOSE=y

CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n

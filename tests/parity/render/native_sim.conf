CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y
CONFIG_ZMK_BLE=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_DEBUG=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
# US locale (default), EVENTS for the preview query path, VERBOSE so save types
# the preview, RAM-only so the assign is synchronous.
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_PERSIST=n
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_EVENTS=y
CONFIG_ZMK_BEHAVIOR_DYNAMIC_MACRO_FEEDBACK_VERBOSE=y
